<script>
/* =========================================================
   STAGE PLOT v2 — set design previz
   companion to Light Plot & Projection Plot, same structure

   S: settings · T: top · F: front
   click select · shift-click multi-select · drag to move
   R rotates selection · delete removes selection
   group / ungroup from the ON STAGE section

   >>> TO EDIT THE ABOUT TEXT AND FOOTER CREDIT, change
   >>> CONFIG.aboutText and CONFIG.footerText just below.
   >>> They are intentionally not editable from the interface.
   ========================================================= */

// -------------------- CONFIG --------------------
const CONFIG = {
  stageWidth: 12,
  stageDepth: 10,
  perspective: 0.35,
  pitchTop: 90,
  pitchFront: 14,
  showLabels: true,

  footerText: '\u00A9 Gaurav Singh Nijjer 2026',

  aboutText:
`STAGE PLOT
a previsualization sketchpad for stage and set design.
companion to Light Plot and Projection Plot: a quick shared
starting point before build day, not a CAD replacement.

HOW TO USE
\u2022 drag the empty canvas down for the audience view, up for the top view
\u2022 open settings (S) and search the property catalog: chair, ladder,
  platform, bridge, fountain, charpai, anything \u2014 click to place it
\u2022 drag a piece to position it \u00B7 R rotates by 45\u00B0 \u00B7 delete removes it
\u2022 selecting a piece shows a quick bar right on the canvas: line/fill,
  color, and group/ungroup, no need to open the panel
\u2022 shift-click pieces (on canvas or in the list) to multi-select,
  then group them so they move, rotate and delete as one unit
\u2022 every piece has line color, line/fill mode, uniform scale, separate
  width and depth stretch, and elevation for placing things on platforms
\u2022 drag the white figures to check human scale against the set
\u2022 keys: T top \u00B7 F front

A scene is one complete stage picture: every placed property with its
position, rotation, scale, stretch, color, mode and grouping, plus the
backdrop and the performers. Save a scene as a file, load it anytime.

Dimensions are indicative and pieces are simplified silhouettes, this
is just an indicative tool for design planning purposes. Check real
measurements before building.

Made for set designers, directors, production designers and anyone
sketching a stage picture before walking into the workshop.

\u00A9 Gaurav Singh Nijjer 2026`,

  backdrop: {
    on: true,
    mode: 'gradient',   // off | wash | gradient
    color: '#16233f',
    h: 6
  }
};

const DEFAULT_CONFIG = JSON.parse(JSON.stringify(CONFIG));

// >>> credit hyperlink target, edit here if the site address changes
const CREDIT_URL = 'https://gauravnijjer.com';
const CREDIT_NAME = 'Gaurav Singh Nijjer';
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function linkifyCredit(s) {
  const link = '<a href="' + CREDIT_URL + '" target="_blank" rel="noopener noreferrer">' +
    CREDIT_NAME + '</a>';
  return escapeHtml(s).split(CREDIT_NAME).join(link);
}

// -------------------- PROPERTY CATALOG --------------------
// Primitives in local meters, centred at origin, back toward +z (upstage).
//   B(x,z,w,d,y0,y1)          box
//   C(x,z,r,y0,y1)            cylinder (10-gon prism, vertical axis)
//   L(x,z,y0,y1)              vertical line
//   LN(ax,az,ay, bx,bz,by)    free line between two 3D points
//   vcirc(cx,cz,cy,r,plane)   vertical circle from 8 line segments;
//                             plane 'x' faces the audience, 'z' faces sideways
const B  = (x,z,w,d,y0,y1) => ({t:'box',x,z,w,d,y0,y1});
const C  = (x,z,r,y0,y1)   => ({t:'cyl',x,z,r,y0,y1});
const L  = (x,z,y0,y1)     => ({t:'leg',x,z,y0,y1});
const LN = (ax,az,ay,bx,bz,by) => ({t:'line',ax,az,ay,bx,bz,by});
// uses Math directly because p5 constants aren't available at parse time
function vcirc(cx, cz, cy, r, plane) {
  const out = [], n = 8;
  for (let i = 0; i < n; i++) {
    const a0 = 2*Math.PI*i/n, a1 = 2*Math.PI*(i+1)/n;
    const u0 = Math.cos(a0)*r, v0 = Math.sin(a0)*r;
    const u1 = Math.cos(a1)*r, v1 = Math.sin(a1)*r;
    if (plane === 'x')
      out.push(LN(cx+u0, cz, cy+v0, cx+u1, cz, cy+v1));
    else
      out.push(LN(cx, cz+u0, cy+v0, cx, cz+u1, cy+v1));
  }
  return out;
}

function legs4(hw, hd, y1) {
  return [L(-hw,-hd,0,y1), L(hw,-hd,0,y1), L(-hw,hd,0,y1), L(hw,hd,0,y1)];
}
function railing(x0, x1, z, y0, y1, posts) {
  const out = [LN(x0,z,y1, x1,z,y1)];
  for (let i = 0; i <= posts; i++) {
    const x = x0 + (x1 - x0) * i / posts;
    out.push(L(x, z, y0, y1));
  }
  return out;
}
function stairs(n, stepW, stepD, stepH) {
  const out = [];
  for (let i = 0; i < n; i++) {
    out.push(B(0, -((n-1)/2)*stepD + i*stepD, stepW, stepD, 0, (i+1)*stepH));
  }
  return out;
}

    P_('bench',w*.4,d*.3), P_('flag pole',-w*.55,d*.85) ] },
  { name:'press conference', items:(w,d)=>[

// -------------------- STATE --------------------
let pieces = [];
let performers = [ { id:1, x:0, z:5 }, { id:2, x:-2.4, z:4.2 } ];
let nextPieceId = 1, nextPerfId = 3, nextGroupId = 1;
let selectedPiece = null;        // primary selection
let multiSel = new Set();        // full selection (includes primary)
let cam = { pitch: 90, target: 90, scale: 1, cy: 0 };
let drag = null;
let panelOpen = false;
let searchQuery = '';
let startersShown = 10;

function catalogByName(name) { return CATALOG.find(k => k.name === name); }

function addPiece(name, x, z, rot=0, scale=1, opts={}) {
  const P = { id: nextPieceId++, name, x, z, rot, scale,
    sx: opts.sx || 1, sz: opts.sz || 1,
    elev: opts.elev || 0, color: opts.color || '#ffffff',
    mode: opts.mode || 'line', group: null };
  pieces.push(P);
  setSelection(P.id);
  return P;
}

// selection helpers: selecting a grouped piece pulls in its whole group
function setSelection(id, additive=false) {
  if (!additive) multiSel.clear();
  if (id === null) { selectedPiece = null; return; }
  selectedPiece = id;
  const P = pieces.find(x => x.id === id);
  if (P && P.group !== null) {
    for (const q of pieces) if (q.group === P.group) multiSel.add(q.id);
  } else {
    if (additive && multiSel.has(id)) multiSel.delete(id);
    else multiSel.add(id);
  }
}
function selectionPieces() {
  return pieces.filter(p => multiSel.has(p.id));
}

// -------------------- PROJECTION MATH --------------------
function camUpdate() {
  cam.pitch = lerp(cam.pitch, cam.target, 0.18);
  cam.scale = min(width * 0.62 / CONFIG.stageWidth,
                  height * 0.58 / CONFIG.stageDepth);
  const sp = sin(radians(cam.pitch));
  cam.cy = lerp(height * 0.68, height * 0.50, sp);
}
function project(x, y, z) {
  const p = radians(cam.pitch);
  const sp = sin(p), cp = cos(p);
  const persp = 1 - (z / CONFIG.stageDepth) * CONFIG.perspective * cp;
  const sx = width / 2 + x * cam.scale * persp;
  const sy = cam.cy
           - (z - CONFIG.stageDepth * 0.45) * cam.scale * sp * 0.92
           - y * cam.scale * cp * persp;
  return { x: sx, y: sy };
}
function floorCircle(cx, cz, r, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = TWO_PI * i / n;
    pts.push(project(cx + cos(a) * r, 0, cz + sin(a) * r));
  }
  return pts;
}
function poly(pts) {
  beginShape();
  for (const p of pts) vertex(p.x, p.y);
  endShape(CLOSE);
}

// -------------------- SKETCH --------------------
function setup() {
  createCanvas(windowWidth, windowHeight);
  buildPanel();

  document.getElementById('footerCredit').innerHTML = linkifyCredit(CONFIG.footerText);

  document.getElementById('exportBtn').onclick = exportSheet;
  document.getElementById('saveBtn').onclick = saveScene;

  document.getElementById('loadBtn').onclick = () => lf.click();
  lf.onchange = () => loadScene(lf);
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); }

function draw() {
  camUpdate();
  drawScene();
  drawHUD();
  updateFloatBar();
}

function drawScene() {
  background(0);
  const p = radians(cam.pitch);
  const sp = sin(p), cp = cos(p);

  drawBackdrop(cp);
  drawStage(sp);

  const sorted = [...pieces].sort((a, b) => b.z - a.z);
  for (const P of sorted) drawPiece(P);
  for (const A of performers) drawPerformer(A);
}

// -------------------- STAGE & BACKDROP --------------------
function drawStage(sp) {
  const W = CONFIG.stageWidth / 2, D = CONFIG.stageDepth;
  const c = [ project(-W,0,0), project(W,0,0), project(W,0,D), project(-W,0,D) ];
  noFill(); stroke(255, 200); strokeWeight(1.4);
  poly(c);

  stroke(255, 55); strokeWeight(1);
  drawingContext.setLineDash([5, 6]);
  const c1 = project(0,0,0), c2 = project(0,0,D);
  line(c1.x, c1.y, c2.x, c2.y);
  drawingContext.setLineDash([]);

  stroke(255, 90);
  for (const t of [-W, W]) {
    const a = project(t, 0, 0), b = project(t, 0, -0.4);
    line(a.x, a.y, b.x, b.y);
  }
  if (CONFIG.showLabels && sp > 0.55) {
    noStroke(); fill(255, 90);
    textFont('DM Mono'); textSize(10); textAlign(CENTER);
    const us = project(0, 0, D + 0.5), ds = project(0, 0, -0.9);
    text('UPSTAGE', us.x, us.y);
    text('DOWNSTAGE / AUDIENCE', ds.x, ds.y);
  }
}

function drawBackdrop(cp) {
  const BD = CONFIG.backdrop;
  if (!BD.on) return;
  const W = CONFIG.stageWidth / 2 + 1, z = CONFIG.stageDepth + 0.3;
  const a = project(-W, 0, z), b = project(W, 0, z);
  const c = project(W, BD.h, z), d = project(-W, BD.h, z);
  const col = color(BD.color);
  noStroke();
  if (BD.mode === 'wash') {
    fill(col);
    quad(a.x,a.y, b.x,b.y, c.x,c.y, d.x,d.y);
  } else if (BD.mode === 'gradient') {
    const n = 18;
    for (let i = 0; i < n; i++) {
      const t0 = i/n, t1 = (i+1)/n, k = 1 - t0;
      const p0 = project(-W, lerp(0, BD.h, t0), z), p1 = project(W, lerp(0, BD.h, t0), z);
      const p2 = project(W, lerp(0, BD.h, t1), z), p3 = project(-W, lerp(0, BD.h, t1), z);
      fill(red(col)*k, green(col)*k, blue(col)*k);
      quad(p0.x,p0.y, p1.x,p1.y, p2.x,p2.y, p3.x,p3.y);
    }
  }
  noFill(); stroke(255, 60); strokeWeight(1);
  quad(a.x,a.y, b.x,b.y, c.x,c.y, d.x,d.y);
}

// -------------------- PIECE RENDERING --------------------
// local -> world with per-axis stretch (sx, sz), rotation, uniform scale,
// and elevation. height uses uniform scale only.
function tfPoint(P, lx, ly, lz) {
  const r = radians(P.rot), s = P.scale;
  const ex = lx * (P.sx || 1), ez = lz * (P.sz || 1);
  const rx = (ex*cos(r) - ez*sin(r)) * s;
  const rz = (ex*sin(r) + ez*cos(r)) * s;
  return [P.x + rx, P.elev + ly*s, P.z + rz];
}
function boxCorners(P, bx) {
  const cs = [
    [bx.x - bx.w/2, bx.z - bx.d/2], [bx.x + bx.w/2, bx.z - bx.d/2],
    [bx.x + bx.w/2, bx.z + bx.d/2], [bx.x - bx.w/2, bx.z + bx.d/2]
  ];
  const bot = cs.map(([lx,lz]) => { const [x,y,z] = tfPoint(P, lx, bx.y0, lz); return project(x,y,z); });
  const top = cs.map(([lx,lz]) => { const [x,y,z] = tfPoint(P, lx, bx.y1, lz); return project(x,y,z); });
  return { bot, top };
}
function cylRings(P, cy, n=10) {
  const bot = [], top = [];
  for (let i = 0; i < n; i++) {
    const a = TWO_PI * i / n;
    const lx = cy.x + cos(a)*cy.r, lz = cy.z + sin(a)*cy.r;
    let [x,y,z] = tfPoint(P, lx, cy.y0, lz); bot.push(project(x,y,z));
    [x,y,z] = tfPoint(P, lx, cy.y1, lz); top.push(project(x,y,z));
  }
  return { bot, top };
}
function drawFillPrism(bot, top, col) {
  const r = red(col), g = green(col), b = blue(col);
  const n = bot.length;
  const faces = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    faces.push({ pts:[bot[i], bot[j], top[j], top[i]],
      y:(bot[i].y + bot[j].y + top[i].y + top[j].y) / 4 });
  }
  faces.sort((a, b2) => a.y - b2.y);
  noStroke();
  for (const f of faces) {
    fill(r*0.55, g*0.55, b*0.55, 235);
    quad(f.pts[0].x,f.pts[0].y, f.pts[1].x,f.pts[1].y,
         f.pts[2].x,f.pts[2].y, f.pts[3].x,f.pts[3].y);
  }
  fill(r*0.95, g*0.95, b*0.95, 240);
  poly(top);
  stroke(r, g, b, 255); strokeWeight(1); noFill();
  poly(top); poly(bot);
}
function drawLinePrism(bot, top, col, wSel) {
  stroke(col); strokeWeight(wSel);
  noFill();
  poly(bot); poly(top);
  const step = bot.length > 6 ? 2 : 1;
  for (let i = 0; i < bot.length; i += step) {
    line(bot[i].x, bot[i].y, top[i].x, top[i].y);
  }
}
function drawPiece(P) {
  const def = catalogByName(P.name);
  if (!def) return;
  const inSel = multiSel.has(P.id);
  const col = color(P.color);
  const wSel = inSel ? 1.6 : 1.2;

  for (const g of def.geo) {
    if (g.t === 'box') {
      const { bot, top } = boxCorners(P, g);
      if (P.mode === 'fill') drawFillPrism(bot, top, col);
      else drawLinePrism(bot, top, col, wSel);
    } else if (g.t === 'cyl') {
      const { bot, top } = cylRings(P, g);
      if (P.mode === 'fill') drawFillPrism(bot, top, col);
      else drawLinePrism(bot, top, col, wSel);
    } else if (g.t === 'leg') {
      const [x0,y0,z0] = tfPoint(P, g.x, g.y0, g.z);
      const [x1,y1,z1] = tfPoint(P, g.x, g.y1, g.z);
      const a = project(x0,y0,z0), b = project(x1,y1,z1);
      stroke(col); strokeWeight(wSel);
      line(a.x, a.y, b.x, b.y);
    } else if (g.t === 'line') {
      const [x0,y0,z0] = tfPoint(P, g.ax, g.ay, g.az);
      const [x1,y1,z1] = tfPoint(P, g.bx, g.by, g.bz);
      const a = project(x0,y0,z0), b = project(x1,y1,z1);
      stroke(col); strokeWeight(wSel);
      line(a.x, a.y, b.x, b.y);
    }
  }

  if (inSel) {
    stroke(P.group !== null ? color(160, 200, 255, 200) : color(255, 190));
    strokeWeight(1);
    drawingContext.setLineDash([3, 3]);
    const c = project(P.x, 0, P.z);
    noFill();
    ellipse(c.x, c.y, 34, 34);
    drawingContext.setLineDash([]);
    if (CONFIG.showLabels && P.id === selectedPiece) {
      noStroke(); fill(255, 150);
      textFont('DM Mono'); textSize(9); textAlign(CENTER);
      text(P.name + (P.group !== null ? ' (grouped)' : ''), c.x, c.y + 26);
    }
  }
}

// -------------------- PERFORMERS --------------------
function drawPerformer(A) {
  noFill(); stroke(255, 160); strokeWeight(1.3);
  poly(floorCircle(A.x, A.z, 0.28, 20));
  const hip = project(A.x, 0.85, A.z);
  const sh  = project(A.x, 1.42, A.z);
  const hd  = project(A.x, 1.58, A.z);
  const fL  = project(A.x - 0.16, 0, A.z);
  const fR  = project(A.x + 0.16, 0, A.z);
  const hL  = project(A.x - 0.30, 1.05, A.z);
  const hR  = project(A.x + 0.30, 1.05, A.z);
  stroke(255, 210); strokeWeight(1.4);
  line(fL.x, fL.y, hip.x, hip.y);
  line(fR.x, fR.y, hip.x, hip.y);
  line(hip.x, hip.y, sh.x, sh.y);
  line(sh.x, sh.y, hL.x, hL.y);
  line(sh.x, sh.y, hR.x, hR.y);
  noFill();
  const headR = dist(sh.x, sh.y, hd.x, hd.y) * 1.7 + 3;
  ellipse(hd.x, hd.y - headR * 0.4, headR, headR);
}

// -------------------- HUD --------------------
function drawHUD() {
  const mobile = width < 640;
  const stripH = mobile ? 46 : 54;
  noStroke();
  fill(255, 14);
  rect(0, height - stripH, width, stripH);
  stroke(255, 30); strokeWeight(1);
  line(0, height - stripH, width, height - stripH);

  noStroke(); textFont('DM Mono'); textAlign(LEFT);
  const mode = cam.pitch > 60 ? 'TOP VIEW' : cam.pitch < 30 ? 'AUDIENCE VIEW' : 'TILTING';
  fill(255, 220); textSize(mobile ? 10 : 11);
  text(mode + (multiSel.size > 1 ? '  \u00B7  ' + multiSel.size + ' selected' : ''),
    14, height - (mobile ? 27 : 33));
  fill(255, 170); textSize(mobile ? 9 : 11);
  const hint = mobile
    ? 'drag to tilt \u00B7 S settings \u00B7 shift-click multi-select \u00B7 R rotate \u00B7 delete'
    : 'drag empty canvas \u2193 audience view \u00B7 \u2191 top view  |  search & place properties in settings  |  shift-click to multi-select \u00B7 group in ON STAGE \u00B7 R rotates \u00B7 delete removes  |  S settings';
  text(hint, 14, height - (mobile ? 12 : 14));
}

// -------------------- INTERACTION --------------------
function overCanvas(evt) {
  return !evt || !evt.target || evt.target.tagName === 'CANVAS';
}
function mousePressed(evt) {
  if (!overCanvas(evt)) return;
  // read shift directly off the event; p5's keyIsDown can miss it when
  // the window has lost key focus
  const shift = (evt && evt.shiftKey) || keyIsDown(SHIFT);
  for (const A of performers) {
    const Pp = project(A.x, 0.85, A.z);
    const F = project(A.x, 0, A.z);
    if (dist(mouseX, mouseY, Pp.x, Pp.y) < 22 || dist(mouseX, mouseY, F.x, F.y) < 16) {
      drag = { kind:'performer', id:A.id }; return;
    }
  }
  const sorted = [...pieces].sort((a, b) => a.z - b.z);
  for (const P of sorted) {
    const c = project(P.x, 0.4 * P.scale + P.elev, P.z);
    if (dist(mouseX, mouseY, c.x, c.y) < 30) {
      setSelection(P.id, shift);
      drag = { kind:'piece', id:P.id };
      refreshPlacedList(); return;
    }
  }
  if (!shift) { setSelection(null); refreshPlacedList(); }
  drag = { kind:'cam' };
}
function mouseDragged(evt) {
  if (!drag || !overCanvas(evt)) return;
  const dxs = mouseX - pmouseX, dys = mouseY - pmouseY;
  if (drag.kind === 'cam') {
    cam.target = constrain(cam.target - dys * 0.35, CONFIG.pitchFront, CONFIG.pitchTop);
    cam.pitch = cam.target;
    return;
  }
  const p = radians(cam.pitch);
  const dxw = dxs / cam.scale;
  const dzw = -dys / (cam.scale * max(sin(p), 0.28));
  const W = CONFIG.stageWidth / 2, D = CONFIG.stageDepth;

  if (drag.kind === 'piece') {
    // move the whole selection together (covers groups automatically)
    const targets = multiSel.has(drag.id) ? selectionPieces()
      : pieces.filter(x => x.id === drag.id);
    for (const P of targets) {
      P.x = constrain(P.x + dxw, -W - 2, W + 2);
      P.z = constrain(P.z + dzw, -1, D + 1);
    }
  } else if (drag.kind === 'performer') {
    const A = performers.find(a => a.id === drag.id); if (!A) return;
    A.x = constrain(A.x + dxw, -W, W);
    A.z = constrain(A.z + dzw, 0, D);
  }
}
function mouseReleased() { drag = null; }

function rotateSelection() {
  const sel = selectionPieces();
  if (!sel.length) return;
  if (sel.length === 1) {
    sel[0].rot = (sel[0].rot + 45) % 360;
  } else {
    // rotate the whole selection 45° around its centroid
    const cx = sel.reduce((s,p)=>s+p.x,0)/sel.length;
    const cz = sel.reduce((s,p)=>s+p.z,0)/sel.length;
    const a = radians(45);
    for (const P of sel) {
      const dx = P.x - cx, dz = P.z - cz;
      P.x = cx + dx*cos(a) - dz*sin(a);
      P.z = cz + dx*sin(a) + dz*cos(a);
      P.rot = (P.rot + 45) % 360;
    }
  }
  refreshDetail();
}

function keyPressed() {
  if (document.activeElement &&
      ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (key === 's' || key === 'S') togglePanel();
  else if (key === 't' || key === 'T') cam.target = CONFIG.pitchTop;
  else if (key === 'f' || key === 'F') cam.target = CONFIG.pitchFront;
  else if (key === 'r' || key === 'R') rotateSelection();
  else if (keyCode === DELETE || keyCode === BACKSPACE) {
    if (multiSel.size) {
      pieces = pieces.filter(x => !multiSel.has(x.id));
      setSelection(null);
      refreshPlacedList();
      return false;
    }
  }
}

// -------------------- GROUPING --------------------
function groupSelection() {
  const sel = selectionPieces();
  if (sel.length < 2) return;
  const gid = nextGroupId++;
  for (const P of sel) P.group = gid;
  refreshPlacedList();
}
function ungroupSelection() {
  const sel = selectionPieces();
  for (const P of sel) P.group = null;
  refreshPlacedList();
}

// -------------------- FLOATING QUICK BAR --------------------
// appears next to the selected piece on the canvas: line/fill toggle,
// color picker, and group/ungroup when it applies. edits apply to the
// whole current selection.
let floatBar, fbLine, fbFill, fbColor, fbGroup, fbUngroup;
let fbSig = null; // selection signature, so the color input isn't reset mid-drag

function buildFloatBar() {
  floatBar = document.getElementById('floatBar');
  fbLine = document.createElement('button');
  fbLine.textContent = 'line';
  fbLine.onclick = () => { for (const q of selectionPieces()) q.mode = 'line';
    fbSig = null; refreshPlacedList(); };
  fbFill = document.createElement('button');
  fbFill.textContent = 'fill';
  fbFill.onclick = () => { for (const q of selectionPieces()) q.mode = 'fill';
    fbSig = null; refreshPlacedList(); };
  fbColor = document.createElement('input');
  fbColor.type = 'color';
  fbColor.oninput = () => { for (const q of selectionPieces()) q.color = fbColor.value; };
  fbColor.onchange = () => refreshPlacedList();
  fbGroup = document.createElement('button');
  fbGroup.textContent = 'group';
  fbGroup.onclick = () => { groupSelection(); fbSig = null; };
  fbUngroup = document.createElement('button');
  fbUngroup.textContent = 'ungroup';
  fbUngroup.onclick = () => { ungroupSelection(); fbSig = null; };
  floatBar.append(fbLine, fbFill, fbColor, fbGroup, fbUngroup);
}

function updateFloatBar() {
  if (!floatBar) return;
  const P = pieces.find(x => x.id === selectedPiece);
  if (!P) { floatBar.classList.remove('show'); fbSig = null; return; }
  floatBar.classList.add('show');

  // reposition every frame so it follows the piece and the camera
  const c = project(P.x, 0, P.z);
  const bw = floatBar.offsetWidth || 180, bh = floatBar.offsetHeight || 32;
  const bx = constrain(c.x - bw / 2, 8, width - bw - 8);
  const by = constrain(c.y - bh - 42, 8, height - bh - 60);
  floatBar.style.left = bx + 'px';
  floatBar.style.top = by + 'px';

  // refresh contents only when the selection actually changes, so the
  // native color picker stays open while dragging around the wheel
  const sig = P.id + '|' + P.mode + '|' + multiSel.size + '|' + P.group;
  if (sig !== fbSig) {
    fbSig = sig;
    fbLine.className = 'mode' + (P.mode === 'line' ? ' active' : '');
    fbFill.className = 'mode' + (P.mode === 'fill' ? ' active' : '');
    fbColor.value = P.color;
    const grouped = P.group !== null;
    fbGroup.style.display = (!grouped && multiSel.size >= 2) ? 'inline-block' : 'none';
    fbUngroup.style.display = grouped ? 'inline-block' : 'none';
  }
}

// -------------------- PANEL --------------------
const $ = (tag, cls, parent, txt) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  if (parent) parent.appendChild(e);
  return e;
};
let panelEl, catGridEl, placedListEl, detailEl, countEl, starterGridEl, starterMoreBtn;

function slider(parent, label, mn, mx, step, get, set, fmt) {
  const row = $('div', 'row', parent);
  $('label', null, row, label);
  const inp = $('input', null, row);
  inp.type = 'range'; inp.min = mn; inp.max = mx; inp.step = step; inp.value = get();
  const out = $('span', 'val', row, fmt ? fmt(get()) : get());
  inp.addEventListener('input', () => {
    set(parseFloat(inp.value));
    out.textContent = fmt ? fmt(parseFloat(inp.value)) : inp.value;
  });
  return inp;
}
function togglePanel() {
  panelOpen = !panelOpen;
  panelEl.style.display = panelOpen ? 'block' : 'none';
}

function buildPanel() {
  panelEl = document.getElementById('panel');
  panelEl.innerHTML = '';

  $('h1', null, panelEl, 'STAGE PLOT');
  $('div', 'sub', panelEl, 'set design previz');

  // VIEW
  $('h2', null, panelEl, 'VIEW');
  const vb = $('div', 'btnrow', panelEl);
  const bt = $('button', null, vb, 'top');
  const bf = $('button', null, vb, 'audience');
  bt.onclick = () => cam.target = CONFIG.pitchTop;
  bf.onclick = () => cam.target = CONFIG.pitchFront;
  slider(panelEl, 'tilt', CONFIG.pitchFront, CONFIG.pitchTop, 1,
    () => Math.round(cam.target), v => { cam.target = v; }, v => v + '\u00B0');
  slider(panelEl, 'perspective', 0, 0.6, 0.01,
    () => CONFIG.perspective, v => CONFIG.perspective = v, v => Number(v).toFixed(2));

  // STAGE
  $('h2', null, panelEl, 'STAGE');
  slider(panelEl, 'width', 6, 24, 0.5,
    () => CONFIG.stageWidth, v => CONFIG.stageWidth = v, v => v + 'm');
  slider(panelEl, 'depth', 5, 20, 0.5,
    () => CONFIG.stageDepth, v => CONFIG.stageDepth = v, v => v + 'm');

  // BACKDROP
  $('h2', null, panelEl, 'BACKDROP');
  const bb = $('div', 'btnrow', panelEl);
  const bOn = $('button', null, bb, CONFIG.backdrop.on ? 'backdrop: on' : 'backdrop: off');
  bOn.onclick = () => { CONFIG.backdrop.on = !CONFIG.backdrop.on;
    bOn.textContent = CONFIG.backdrop.on ? 'backdrop: on' : 'backdrop: off'; };
  const bmrow = $('div', 'row', panelEl);
  $('label', null, bmrow, 'mode');
  const bsel = $('select', null, bmrow);
  for (const o of ['wash','gradient'])
    { const op = $('option', null, bsel, o); op.value = o; }
  bsel.value = CONFIG.backdrop.mode;
  bsel.onchange = () => CONFIG.backdrop.mode = bsel.value;
  const bcrow = $('div', 'row', panelEl);
  $('label', null, bcrow, 'color');
  const bcin = $('input', null, bcrow); bcin.type = 'color'; bcin.value = CONFIG.backdrop.color;
  bcin.oninput = () => CONFIG.backdrop.color = bcin.value;

  // STARTER SCENES (collapsible: 10, then load more)
  $('h2', null, panelEl, 'STARTER SCENES');
  starterGridEl = $('div', 'modegrid', panelEl);
  starterMoreBtn = $('button', 'wide', panelEl, '');
  starterMoreBtn.onclick = () => {
    startersShown = Math.min(startersShown + 10, STARTERS.length);
    renderStarters();
  };
  renderStarters();
  $('div', 'hint', panelEl,
    'a starter replaces the current set with a small arrangement you can pull apart and rebuild. it scales to your stage size.');

  // SCENE
  $('h2', null, panelEl, 'SCENE');
  const pb = $('div', 'btnrow', panelEl);
  const ex = $('button', null, pb, 'export image');
  ex.onclick = exportSheet;
  const pb2 = $('div', 'btnrow', panelEl);
  const sv = $('button', null, pb2, 'save scene');
  sv.onclick = saveScene;
  const im = $('button', null, pb2, 'load scene');
  const file = $('input', null, panelEl);
  file.type = 'file'; file.accept = '.json'; file.style.display = 'none';
  im.onclick = () => file.click();
  file.onchange = () => loadScene(file);
  const rs = $('button', 'danger', pb2, 'reset');
  rs.onclick = resetAll;
  $('div', 'hint', panelEl,
    'one scene = every placed property with its position, rotation, scale, stretch, color, mode and grouping, plus backdrop and performers.');

  // STAGE PROPERTIES
  $('h2', null, panelEl, 'STAGE PROPERTIES');
  const searchIn = $('input', null, panelEl);
  searchIn.type = 'text';
  searchIn.placeholder = 'search: chair, fountain, platform, train\u2026';
  searchIn.value = searchQuery;
  searchIn.oninput = () => { searchQuery = searchIn.value; renderCatalog(); };
  catGridEl = $('div', null, panelEl);
  countEl = $('div', 'hint', panelEl, '');
  renderCatalog();

  // ON STAGE
  $('h2', null, panelEl, 'ON STAGE');
  const gb = $('div', 'btnrow', panelEl);
  const grp = $('button', null, gb, 'group selected');
  grp.onclick = groupSelection;
  const ungrp = $('button', null, gb, 'ungroup');
  ungrp.onclick = ungroupSelection;
  $('div', 'hint', panelEl,
    'shift-click pieces on the canvas or in this list to multi-select, then group. grouped pieces move, rotate (R) and delete together.');
  placedListEl = $('div', null, panelEl);
  detailEl = $('div', null, panelEl);
  detailEl.id = 'detail';
  refreshPlacedList();

  // PERFORMERS
  $('h2', null, panelEl, 'PERFORMERS');
  const ab = $('div', 'btnrow', panelEl);
  const aAdd = $('button', null, ab, '+ performer');
  aAdd.onclick = () => performers.push({ id: nextPerfId++,
    x: random(-2, 2), z: CONFIG.stageDepth / 2 });
  const aRem = $('button', null, ab, '\u2212 performer');
  aRem.onclick = () => performers.pop();
  $('div', 'hint', panelEl,
    'the white figures are 1.75m tall, keep one nearby as a scale reference while you place larger structures.');
}

function renderStarters() {
  if (!starterGridEl) return;
  starterGridEl.innerHTML = '';
  for (const st of STARTERS.slice(0, startersShown)) {
    const b = $('button', null, starterGridEl, st.name);
    b.onclick = () => applyStarter(st);
  }
  if (startersShown >= STARTERS.length) {
    starterMoreBtn.style.display = 'none';
  } else {
    starterMoreBtn.style.display = 'block';
    starterMoreBtn.textContent = 'load more (' +
      (STARTERS.length - startersShown) + ' more) \u25BE';
  }
}

function renderCatalog() {
  if (!catGridEl) return;
  catGridEl.innerHTML = '';
  const q = searchQuery.trim().toLowerCase();
  const matches = CATALOG.filter(k =>
    !q || k.name.includes(q) || k.cat.includes(q) ||
    k.tags.some(t => t.includes(q)));
  const cats = [...new Set(matches.map(k => k.cat))];
  for (const cat of cats) {
    $('h3', null, catGridEl, cat.toUpperCase());
    const grid = $('div', 'catgrid', catGridEl);
    for (const k of matches.filter(m => m.cat === cat)) {
      const b = $('button', null, grid, '+ ' + k.name);
      b.title = k.name;
      b.onclick = () => {
        addPiece(k.name, random(-1, 1), CONFIG.stageDepth / 2, 0, 1);
        refreshPlacedList();
      };
    }
  }
  if (countEl) countEl.textContent = matches.length + ' of ' + CATALOG.length +
    ' properties' + (q ? ' matching \u201C' + q + '\u201D' : '') +
    '. every piece can be scaled, stretched, rotated, recolored, elevated, grouped, and switched between line and fill.';
}

function applyStarter(st) {
  const items = st.items(CONFIG.stageWidth / 2, CONFIG.stageDepth);
  pieces = [];
  nextPieceId = 1; nextGroupId = 1;
  multiSel.clear(); selectedPiece = null;
  for (const it of items) {
    addPiece(it.name, it.x, it.z, it.rot || 0, it.scale || 1,
      { elev: it.elev || 0, sx: it.sx || 1, sz: it.sz || 1 });
  }
  setSelection(null);
  refreshPlacedList();
}

function refreshPlacedList() {
  if (!placedListEl) return;
  placedListEl.innerHTML = '';
  if (!pieces.length) {
    $('div', 'hint', placedListEl, 'nothing on stage yet \u2014 search the catalog above and click a property to place it.');
  }
  pieces.forEach((P, i) => {
    let cls = 'itemrow';
    if (P.id === selectedPiece) cls += ' sel';
    else if (multiSel.has(P.id)) cls += ' multi';
    const row = $('div', cls, placedListEl);
    $('div', 'nm', row, (i + 1) + ' \u00B7 ' + P.name +
      (P.group !== null ? ' [g' + P.group + ']' : ''));
    const rc = $('input', null, row);
    rc.type = 'color'; rc.value = P.color;
    rc.onclick = (e) => e.stopPropagation();
    rc.oninput = () => { P.color = rc.value; };
    $('div', 'typ', row, P.mode.toUpperCase());
    row.onclick = (e) => { setSelection(P.id, e.shiftKey); refreshPlacedList(); };
  });
  refreshDetail();
}

function refreshDetail() {
  if (!detailEl) return;
  const P = pieces.find(x => x.id === selectedPiece);
  detailEl.innerHTML = '';
  if (!P) { detailEl.style.display = 'none'; return; }
  detailEl.style.display = 'block';

  $('div', 'hint', detailEl, P.name +
    (multiSel.size > 1 ? '  \u00B7  editing primary of ' + multiSel.size + ' selected' : ''));

  const mrow = $('div', 'btnrow', detailEl);
  const lineB = $('button', 'mode' + (P.mode === 'line' ? ' active' : ''), mrow, 'line');
  const fillB = $('button', 'mode' + (P.mode === 'fill' ? ' active' : ''), mrow, 'fill');
  lineB.onclick = () => { for (const q of selectionPieces()) q.mode = 'line'; refreshPlacedList(); };
  fillB.onclick = () => { for (const q of selectionPieces()) q.mode = 'fill'; refreshPlacedList(); };

  const crow = $('div', 'row', detailEl);
  $('label', null, crow, 'color');
  const cin = $('input', null, crow); cin.type = 'color'; cin.value = P.color;
  cin.oninput = () => { for (const q of selectionPieces()) q.color = cin.value; };
  cin.onchange = () => refreshPlacedList();

  slider(detailEl, 'scale', 0.3, 3, 0.05,
    () => P.scale, v => P.scale = v, v => Number(v).toFixed(2) + '\u00D7');
  slider(detailEl, 'width \u00D7', 0.3, 4, 0.05,
    () => P.sx, v => P.sx = v, v => Number(v).toFixed(2) + '\u00D7');
  slider(detailEl, 'depth \u00D7', 0.3, 4, 0.05,
    () => P.sz, v => P.sz = v, v => Number(v).toFixed(2) + '\u00D7');
  slider(detailEl, 'rotation', 0, 359, 1,
    () => P.rot, v => P.rot = v, v => Math.round(v) + '\u00B0');
  slider(detailEl, 'elevation', 0, 3, 0.05,
    () => P.elev, v => P.elev = v, v => Number(v).toFixed(2) + 'm');
  $('div', 'hint', detailEl,
    'width and depth stretch the piece along its own axes before rotation, so a flat can become exactly as long as your wall needs to be.');

  const brow = $('div', 'btnrow', detailEl);
  const dup = $('button', null, brow, 'duplicate');
  dup.onclick = () => {
    const copies = selectionPieces().map(q => {
      const C2 = JSON.parse(JSON.stringify(q));
      C2.id = nextPieceId++; C2.x += 0.8; C2.group = null;
      return C2;
    });
    pieces.push(...copies);
    setSelection(copies[copies.length - 1].id);
    refreshPlacedList();
  };
  const del = $('button', 'danger', brow, 'delete');
  del.onclick = () => {
    pieces = pieces.filter(x => !multiSel.has(x.id));
    setSelection(null);
    refreshPlacedList();
  };
}

// -------------------- ABOUT POPUP --------------------
function buildAbout() {
  const btn = document.getElementById('aboutBtn');
  const pop = document.getElementById('aboutPop');
  btn.onclick = () => {
    if (pop.style.display === 'block') { pop.style.display = 'none'; return; }
    pop.innerHTML = '';
    $('h3', null, pop, 'ABOUT / HOW TO USE');
    const txt = $('div', 'txt', pop);
    txt.innerHTML = linkifyCredit(CONFIG.aboutText);
    const br = $('div', 'btnrow', pop);
    const close = $('button', null, br, 'close');
    close.onclick = () => { pop.style.display = 'none'; };
    pop.style.display = 'block';
  };
}

// -------------------- EXPORT: PNG PLOT SHEET --------------------
function captureView(pitch) {
  const pp = cam.pitch, tt = cam.target;
  cam.pitch = pitch; cam.target = pitch;
  camUpdate();
  cam.pitch = pitch;
  drawScene();
  const img = get();
  cam.pitch = pp; cam.target = tt;
  return img;
}

function exportSheet() {
  const top = captureView(CONFIG.pitchTop);
  const front = captureView(CONFIG.pitchFront);

  const pad = 24, headH = 54, labelH = 26;
  const listH = 80 + pieces.length * 18 + 40;
  const sheetW = width;
  const sheetH = headH + (height + labelH) * 2 + listH + pad * 2;

  const pg = createGraphics(sheetW, sheetH);
  pg.background(0);
  pg.textFont('DM Mono, monospace');

  pg.noStroke(); pg.fill(255);
  pg.textSize(15); pg.textAlign(pg.LEFT, pg.TOP);
  pg.text('STAGE PLOT', pad, 18);
  pg.fill(150); pg.textSize(10);
  const now = new Date();
  pg.textAlign(pg.RIGHT, pg.TOP);
  pg.text(now.toLocaleDateString() + '  \u00B7  stage ' +
    CONFIG.stageWidth + 'm \u00D7 ' + CONFIG.stageDepth + 'm  \u00B7  ' +
    CONFIG.footerText, sheetW - pad, 22);

  let y = headH;
  for (const [label, img] of [['TOP VIEW', top], ['AUDIENCE VIEW', front]]) {
    pg.fill(200); pg.textSize(11); pg.textAlign(pg.LEFT, pg.TOP);
    pg.text(label, pad, y);
    y += labelH;
    pg.image(img, 0, y);
    pg.noFill(); pg.stroke(255, 40);
    pg.rect(0, y, sheetW - 1, height);
    pg.noStroke();
    y += height;
  }

  y += pad;
  pg.fill(200); pg.textSize(11);
  pg.text('PROPERTY SCHEDULE', pad, y);
  y += 24;
  pg.fill(120); pg.textSize(10);
  pg.text('#    NAME                       CAT          POS (x,z)      ROT    SCALE   W\u00D7/D\u00D7        ELEV    GRP   MODE', pad, y);
  y += 8;
  pg.stroke(255, 50); pg.line(pad, y + 6, sheetW - pad, y + 6);
  pg.noStroke();
  y += 16;
  const padStr = (s, n) => (String(s) + ' '.repeat(n)).slice(0, n);
  pieces.forEach((P, i) => {
    const def = catalogByName(P.name);
    pg.fill(230); pg.textSize(10);
    pg.text(padStr(i + 1, 5) + padStr(P.name, 27) + padStr(def ? def.cat : '?', 13) +
      padStr(P.x.toFixed(1) + ', ' + P.z.toFixed(1), 15) +
      padStr(Math.round(P.rot) + '\u00B0', 7) +
      padStr(P.scale.toFixed(2) + '\u00D7', 8) +
      padStr(P.sx.toFixed(2) + '/' + P.sz.toFixed(2), 13) +
      padStr(P.elev.toFixed(2) + 'm', 8) +
      padStr(P.group !== null ? 'g' + P.group : '\u2014', 6) +
      P.mode, pad, y);
    const c = color(P.color);
    pg.fill(red(c), green(c), blue(c));
    pg.rect(pad + 700, y - 1, 9, 9);
    y += 18;
  });
  y += 6;
  pg.fill(150); pg.textSize(10);
  const BD = CONFIG.backdrop;
  pg.text('backdrop: ' + (BD.on ? (BD.mode + ' \u00B7 ' + BD.color) : 'off') +
    '     performers: ' + performers.length, pad, y);

  save(pg, 'stage-plot-sheet.png');
  setTimeout(() => pg.remove(), 3000);
}

// -------------------- SCENE FILE I/O --------------------
function saveScene() {
  const data = { config: CONFIG, pieces, performers };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stage-plot-scene.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function loadScene(fileInput) {
  const f = fileInput.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.config) {
        delete data.config.footerText;
        delete data.config.aboutText;
        Object.assign(CONFIG, data.config);
      }
      if (data.pieces) {
        pieces = data.pieces.filter(P => catalogByName(P.name)).map(P => ({
          sx: 1, sz: 1, group: null, ...P
        }));
        nextPieceId = Math.max(0, ...pieces.map(p => p.id)) + 1;
        nextGroupId = Math.max(0, ...pieces.map(p => p.group || 0)) + 1;
      }
      if (data.performers) { performers = data.performers;
        nextPerfId = Math.max(0, ...performers.map(a => a.id)) + 1; }
      setSelection(null);
      buildPanel();
    } catch (e) { console.error('scene load failed', e); }
  };
  reader.readAsText(f);
  fileInput.value = '';
}
function resetAll() {
  Object.assign(CONFIG, JSON.parse(JSON.stringify(DEFAULT_CONFIG)));
  pieces = [];
  performers = [ { id:1, x:0, z:5 }, { id:2, x:-2.4, z:4.2 } ];
  nextPieceId = 1; nextPerfId = 3; nextGroupId = 1;
  setSelection(null);
  startersShown = 10;
  cam.target = CONFIG.pitchTop;
  buildPanel();
}
</script>
